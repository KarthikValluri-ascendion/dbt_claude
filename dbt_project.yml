
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'dbt01'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'dbt01'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the example/
# directory as views. These settings can be overridden in the individual model
# files using the `{{ config(...) }}` macro.
models:
  dbt01:
    staging:
      +schema: staging
      +materialized: view
      +tags: ['staging']

    intermediate:
      +schema: intermediate
      +materialized: ephemeral
      +tags: ['intermediate']

    marts:
      +schema: marts
      +materialized: table
      +tags: ['marts']

# Seeds — the registry (governance catalog) lands in its own schema.
seeds:
  dbt01:
    registry:
      +schema: seed_raw
      +tags: ['registry']

# ---------------------------------------------------------------------------
# Metric source map (drives the registry-driven reconciliation engine).
# Each entry = one (metric, source) pair: where the value comes from and how.
# ADD A METRIC / SOURCE = add an entry here (+ a registry row) — no new SQL file.
# The macro build_metric_values_by_source() iterates this to build the tall fact.
# ---------------------------------------------------------------------------
vars:
  metric_sources:
    - {metric_key: active_seats, source_system: Salesforce, source_model: stg_saas_salesforce, value_sql: 'contracted_seats'}
    - {metric_key: active_seats, source_system: Zuora,      source_model: stg_saas_zuora,      value_sql: 'provisioned_seats'}
    - {metric_key: active_seats, source_system: Product,    source_model: stg_saas_product,    value_sql: 'active_seats_30d'}
    - {metric_key: arr,          source_system: Salesforce, source_model: stg_saas_salesforce, value_sql: 'booking_arr'}
    - {metric_key: arr,          source_system: Zuora,      source_model: stg_saas_zuora,      value_sql: 'mrr * 12'}
    - {metric_key: arr,          source_system: Product,    source_model: stg_saas_product,    value_sql: 'usage_implied_arr'}
    - {metric_key: active_customers, source_system: Salesforce, source_model: stg_saas_salesforce, value_sql: '1'}
    - {metric_key: active_customers, source_system: Zuora,      source_model: stg_saas_zuora,      value_sql: '1'}
    - {metric_key: active_customers, source_system: Product,    source_model: stg_saas_product,    value_sql: '1'}
