version: 2

models:
  # ── Bronze ───────────────────────────────────────────────────────────────
  - name: brz_zoom_phone_subscriptions
    description: "Bronze: 1:1 typed landing of raw Zoom Phone billing subscriptions. No logic."
    columns:
      - name: subscription_id
        tests: [not_null, unique]
      - name: mrr
        tests: [not_null]
      - name: line_status
        tests:
          - accepted_values:
              values: ['active', 'cancelled', 'suspended']

  - name: brz_zoom_phone_cdr
    description: "Bronze: 1:1 typed landing of raw Zoom Phone call detail records (CDR)."
    columns:
      - name: call_id
        tests: [not_null, unique]
      - name: user_id
        tests: [not_null]

  - name: brz_zoom_zuora_billing
    description: "Bronze: 1:1 typed landing of Zuora billing (the billing system of record), one row per subscription."
    columns:
      - name: subscription_id
        tests: [not_null, unique]
      - name: billing_status
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'past_due', 'cancelled']

  # ── Silver ───────────────────────────────────────────────────────────────
  - name: slv_zoom_zuora_billing
    description: >
      Silver: conformed Zuora billing (one row per subscription with billing_status).
      The billing arbiter used by slv_zoom_phone_subscriptions. Zuora has NO certified
      gold metric of its own.
    columns:
      - name: subscription_id
        tests: [not_null, unique]
      - name: billing_status
        tests: [not_null]

  - name: slv_zoom_phone_subscriptions
    description: >
      Silver: Zoom Phone subscriptions feeding ARR. Per the certified catalog, a line
      counts only if it is line-active AND Zuora confirms billing_status='active'
      (past_due/cancelled excluded). Zuora is the billing arbiter.
    columns:
      - name: subscription_id
        tests: [not_null, unique]
      - name: mrr
        tests: [not_null]

  - name: slv_zoom_phone_usage
    description: >
      Silver: distinct Zoom Phone active users (>=1 call in the trailing 30 days,
      anchored to the latest call in telemetry).
    columns:
      - name: user_id
        tests: [not_null]

  # ── Gold ─────────────────────────────────────────────────────────────────
  - name: gld_zoom_certified_metrics
    description: >
      Gold: one row per certified Zoom Phone metric, value COMPUTED from silver per
      the catalog's system-of-record. Must tally with the certified catalog. (No Zuora
      row — Zuora is a silver arbiter, not a certified metric.)
    columns:
      - name: metric_key
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['phone_arr', 'phone_active_users']
      - name: computed_value
        tests: [not_null]
      - name: certified_value
        tests: [not_null]

  - name: gld_zoom_metric_reconciliation
    description: >
      Gold: each computed Zoom Phone metric vs the certified catalog, with variance and
      a discrepancy flag. The gold<->catalog tally the reconciliation skill grounds on.
    columns:
      - name: metric_key
        tests: [not_null, unique]
      - name: is_discrepant
        description: TRUE when the computed gold value diverges from the certified catalog beyond threshold.

  - name: gld_zoom_arr_by_source
    description: >
      Gold (reporting): the "one metric, three meanings" view for phone_arr -
      contracted (Subscriptions), invoiced (Zuora), usage-implied (Telemetry) side by
      side, with a flag for which value matches the certified catalog. Illustrates why
      the number never ties out across systems.
    columns:
      - name: source_system
        tests:
          - not_null
          - accepted_values:
              values: ['Subscriptions', 'Zuora', 'Telemetry']
      - name: arr_value
        tests: [not_null]

seeds:
  - name: mart_zoom_metric_catalog
    description: >
      The certified Zoom Phone metric catalog / glossary — canonical definition,
      system-of-record, certified target value, and discrepancy threshold per metric.
    columns:
      - name: metric_key
        tests: [not_null, unique]
      - name: system_of_record
        tests:
          - not_null
          - accepted_values:
              values: ['Billing', 'Telemetry']

  - name: raw_zoom_zuora_billing
    description: "Raw Zuora billing seed (billing system of record): subscription billing status + invoice amount."
    columns:
      - name: subscription_id
        tests: [not_null, unique]
      - name: billing_status
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'past_due', 'cancelled']
