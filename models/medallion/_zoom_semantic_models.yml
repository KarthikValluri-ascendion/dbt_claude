version: 2

# ---------------------------------------------------------------------------
# dbt MetricFlow (Semantic Layer) — SERVING layer over the Zoom Phone certified
# gold. Mirrors the SaaS `certified_metrics` pattern.
#
# The medallion + catalog RECONCILE and CERTIFY (silver computes, gold reconciles
# to the catalog). THIS layer SERVES the certified number consistently to every
# consumer (BI, notebooks, `dbt sl query`, the Semantic Layer API) so phone_arr
# resolves to ONE definition everywhere — killing the "three meanings" problem at
# the consumption layer.
#
# It serves the pipeline-COMPUTED value. Correctness is guaranteed UPSTREAM by the
# gold<->catalog reconciliation (gld_zoom_metric_reconciliation.is_discrepant) +
# the assert_zoom_gold_ties_to_catalog test — NOT here. MetricFlow does not
# reconcile or validate; garbage in, garbage out. (So while the SCRUM silver bug is
# live, zoom_phone_arr serves the inflated value; after the fix it serves $2.4M.)
#
# Querying requires `pip install dbt-metricflow`; the definitions below are part of
# the dbt-core schema and validate with `dbt parse`. The daily time spine is the
# shared project model `metricflow_time_spine`.
# ---------------------------------------------------------------------------

semantic_models:
  - name: zoom_certified_metrics
    description: Certified Zoom Phone metrics, one row per metric (the single served definition).
    model: ref('gld_zoom_certified_metrics')
    defaults:
      agg_time_dimension: snapshot_date
    entities:
      - name: zoom_metric
        type: primary
        expr: metric_key
    dimensions:
      - name: metric_key
        type: categorical
      - name: snapshot_date
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: zoom_certified_value_total
        description: Sum of the pipeline-computed certified value (filter by metric to get a specific one).
        agg: sum
        expr: computed_value
        agg_time_dimension: snapshot_date

metrics:
  - name: zoom_phone_arr
    description: Certified Zoom Phone ARR (system of record = Billing/Zuora). Served value; reconciled to the catalog upstream.
    label: Zoom Phone ARR (Certified)
    type: simple
    type_params:
      measure: zoom_certified_value_total
    filter: "{{ Dimension('zoom_metric__metric_key') }} = 'phone_arr'"

  - name: zoom_phone_active_users
    description: Certified Zoom Phone Active Users (system of record = Telemetry). Served value; reconciled to the catalog upstream.
    label: Zoom Phone Active Users (Certified)
    type: simple
    type_params:
      measure: zoom_certified_value_total
    filter: "{{ Dimension('zoom_metric__metric_key') }} = 'phone_active_users'"
