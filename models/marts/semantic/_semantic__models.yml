version: 2

models:
  - name: metric_certified
    description: >
      Certified single source of truth per metric per account. The authoritative
      source is read from the metric_registry seed (system_of_record) — not
      hardcoded. Adding a metric is a registry/var change, not new SQL.
    columns:
      - name: metric_key
        tests:
          - not_null
          - accepted_values:
              values: ['arr', 'active_seats', 'active_customers']
      - name: account_id
        tests: [not_null]
      - name: certified_value
        tests: [not_null]
      - name: system_of_record
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [metric_key, account_id]

  - name: rpt_metric_reconciliation
    description: >
      Per metric per source vs certified, with variance and a discrepancy flag
      driven by the registry threshold. Generic across all registered metrics.
    columns:
      - name: metric_key
        tests: [not_null]
      - name: source_system
        tests:
          - not_null
          - accepted_values:
              values: ['Salesforce', 'Zuora', 'Product']
      - name: source_value
        tests: [not_null]
      - name: certified_value
        tests: [not_null]
      - name: is_discrepant
        description: TRUE when the source differs from certified beyond the metric's registry threshold.

  - name: rpt_exec_metric_summary
    description: >
      Headline per metric per source totals vs certified, with variance and the
      count of discrepant accounts. Powers the catalog/exec discrepancy table.
    columns:
      - name: metric_key
        tests: [not_null]
      - name: source_system
        tests: [not_null]
      - name: source_total
        tests: [not_null]
      - name: certified_total
        tests: [not_null]
