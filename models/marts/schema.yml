version: 2

models:
  - name: fct_orders
    description: >
      Order fact table — one row per order. Enriched with customer context and
      revenue metrics. Incrementally loaded (merge on order_id).
    columns:
      - name: order_id
        description: Natural key — unique identifier for an order.
        tests:
          - unique
          - not_null

      # ── dbt-update-at date parts (SCRUM-7) ─────────────────────────────
      - name: dbt_updated_day
        description: Day-of-month (1-31) extracted from the _dbt_updated_at timestamp.
        tests:
          - not_null
      - name: dbt_updated_month
        description: Month (1-12) extracted from the _dbt_updated_at timestamp.
        tests:
          - not_null
      - name: dbt_updated_year
        description: Year (e.g. 2026) extracted from the _dbt_updated_at timestamp.
        tests:
          - not_null

      # ── order_value_band classification (SCRUM-10) ────────────────────
      - name: order_value_band
        description: >
          Categorical order-size band derived from final_order_amount, for
          consistent revenue slicing in BI. Bands: JUMBO (>= 1000),
          LARGE (>= 500), MEDIUM (>= 100), SMALL (> 0), ZERO (= 0 / no charge,
          e.g. cancelled or returned orders). Thresholds are the ticket-proposed
          defaults.
        tests:
          - not_null
          - accepted_values:
              values: ['JUMBO', 'LARGE', 'MEDIUM', 'SMALL', 'ZERO']

      # ── discount_tier classification (SCRUM-15) ───────────────────────
      - name: discount_tier
        description: >
          Categorical tier of the order's header-level discount, derived from
          header_discount_pct (a 0-100 percentage), so discount depth is
          bucketed consistently across every report. Tiers (lower-exclusive,
          upper-inclusive): NONE (0%), LOW (>0% to 10%), MEDIUM (>10% to 25%),
          HIGH (>25%). Non-null for every row (header_discount_pct is
          COALESCEd to 0 and constrained to 0-100 in stg_orders).
        tests:
          - not_null
          - accepted_values:
              values: ['NONE', 'LOW', 'MEDIUM', 'HIGH']
